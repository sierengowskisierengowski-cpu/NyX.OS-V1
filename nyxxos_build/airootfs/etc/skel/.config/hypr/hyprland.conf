# ── NVIDIA MSI GS77 — MUST BE FIRST ─────────────────
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = NVD_BACKEND,direct
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,default

# ── MONITOR ──────────────────────────────────────────
monitor = eDP-1,1920x1080@144,0x0,1

# ── AUTOSTART ────────────────────────────────────────
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = swww-daemon
exec-once = swww img ~/.config/hypr/wallpaper.png --transition-type grow --transition-duration 2
exec-once = python /usr/local/bin/nyx_trap.py
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = wl-paste --type text --watch cliphist store

# ── INPUT ────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = yes
        tap-to-click = yes
    }
}

# ── GENERAL ──────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(7B5EA7ff)
    col.inactive_border = rgba(2A2020ff)
    layout = dwindle
}

# ── DECORATION ───────────────────────────────────────
decoration {
    rounding = 4
    blur {
        enabled = false
    }
    drop_shadow = false
}

# ── ANIMATIONS ───────────────────────────────────────
animations {
    enabled = yes
    bezier = nyxCurve, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 4, nyxCurve
    animation = windowsOut, 1, 4, default, popin 80%
    animation = fade, 1, 4, default
    animation = workspaces, 1, 4, default, slide
}

# ── WINDOW RULES ─────────────────────────────────────
windowrule = float, ^(pavucontrol)$
windowrule = float, ^(blueman-manager)$
windowrule = float, ^(nm-connection-editor)$

# ── SNAP LAYOUTS ─────────────────────────────────────
dwindle {
    pseudotile = yes
    preserve_split = yes
}

# ── MOUSE BINDINGS ───────────────────────────────────
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# ── KEY BINDINGS ─────────────────────────────────────
bind = SUPER, Q, exec, kitty
bind = SUPER, E, exec, thunar
bind = SUPER, B, exec, firefox
bind = SUPER, SPACE, exec, wofi --show drun
bind = SUPER, TAB, exec, wofi --show window
bind = SUPER, C, killactive
bind = SUPER, F, fullscreen
bind = SUPER, V, togglefloating

# Snap with keyboard
bind = SUPER, left, movewindow, l
bind = SUPER, right, movewindow, r
bind = SUPER, up, movewindow, u
bind = SUPER, down, movewindow, d

# Workspace switching
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

# Move window to workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
